<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${title})}"></head>
<body>
<div th:replace="~{fragments/header :: preloader}"></div>

<div class="d-flex flex-column justify-content-center align-items-center" style="min-height: 80vh;">
    <!-- ALERT FUERA DE LA TARJETA -->
    <div th:if="${error != null}"
        class="alert alert-danger mb-4"
        role="alert"
        th:text="${error}"
        style="white-space: pre-wrap">A simple danger alert-check it out!
    </div>

    <div th:if="${successMessage}"
         class="success alert-success mb-4"
         role="success"
         th:text="${successMessage}"
         style="white-space: pre-wrap">A simple danger alert-check it out!
    </div>

    <!-- TARJETA -->
    <div class="card shadow-lg border-0" style="width: 500px">
        <div class="card-body text-center p-4">
            <h4 class="mb-3 text-primary">Inicio de Sesión</h4>

            <form method="post" th:action="@{/users/login}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="mb-3 text-start">
                    <label class="form-label">Acceder con:</label><br>
                    <input type="radio" name="loginType" value="username" id="radioUsername" checked>
                    <label for="radioUsername">Nombre de usuario</label>

                    <input type="radio" name="loginType" value="email" id="radioEmail" class="ms-3">
                    <label for="radioEmail">Email</label>
                </div>

                <div class="mb-3 text-start">
                    <label for="username" class="form-label" id="loginLabel">Nombre de usuario</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Introduce tu nombre de usuario" required>
                </div>

                <div class="mb-3 text-start">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>

                <p class="mb-4" style="color: black;">
                    ¿Todavía no te has registrado?
                    <a th:href="@{/users/register}">Regístrate</a>
                </p>

                <div class="d-flex justify-content-center gap-3 mt-3">
                    <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
                    <a th:href="@{/}" class="btn btn-secondary">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>

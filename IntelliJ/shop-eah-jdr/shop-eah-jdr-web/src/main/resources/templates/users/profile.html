<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${title})}"></head>
<body>
<div th:replace="~{fragments/header :: preloader}"></div>

<div th:replace="~{fragments/header :: header}"></div>

<div th:replace="~{fragments/header :: breadcumb(${subtitulo}, ${titulo})}"></div>
<div class="d-flex justify-content-center align-items-center vh-300">
  <div style="max-width: 900px">

    <div class="card p-4 shadow-sm d-flex flex-row align-items-center">
      <!-- Contenedor de texto -->
      <div class="me-4" style="flex: 3;">
        <p style="color: #6d3bd9"><strong>Nombre:</strong> <span th:text="| ${user.firstName} ${user.lastName} |"></span></p>
        <p style="color: #6d3bd9"><strong>Apodo:</strong> <span th:text="${user.username}"></span></p>
        <p style="color: #6d3bd9"><strong>Email:</strong> <span th:text="${user.email}"></span></p>

        <p style="color: #6d3bd9">
          <strong>Roles:</strong>
          <span th:text="${#strings.arrayJoin(user.roles.![rolDescription], ', ')}"></span>
        </p>
      </div>

      <!-- Contenedor de imagen -->
      <div style="flex-shrink: 0;">
        <img src="https://definicion.de/wp-content/uploads/2019/07/perfil-de-usuario.png" alt="Foto de usuario"
             style="width: 300px; height: 300px; object-fit: cover; border-radius: 50%;">
      </div>
    </div>

  </div>
</div>

<div th:replace="~{fragments/footer :: carousel}"></div>

<div th:replace="~{fragments/footer :: footer}"></div>

<div th:replace="~{fragments/footer :: copyright}"></div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${title})}"></head>
<body>
<div th:replace="~{fragments/header :: preloader}"></div>

<div th:replace="~{fragments/header-admin :: headeradmin}"></div>

<div th:replace="~{fragments/header :: breadcumb(${subtitulo}, ${titulo})}"></div>

<div class="container mt-4">
    <h2 class="mb-4">Crear Nuevo Producto</h2>

    <form method="post" th:object="${product}" th:novalidate="${!clientValidationEnabled}">
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <div class="alert alert-danger" role="alert"
             th:if="${#fields.hasAnyErrors()}">
            <p>Se han producido errores. Por favor, corríjalos antes de volver a intentar la operación.</p>
            <ul>
                <li th:each="error : ${#fields.errors()}" th:text="${error}">Mensaje de error</li>
            </ul>
        </div>

        <div class="mb-3">
            <label for="ean" class="form-label">EAN: </label>
            <input type="text"
                   class="form-control"
                   id="ean"
                   th:field="*{productEan}"
                   th:errorclass="is-invalid"
                   required>
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('productEan')}"
                 th:errors="*{productEan}">
                Error en EAN
            </div>
        </div>

        <div class="mb-3">
            <label for="name" class="form-label">Nombre: </label>
            <input type="text"
                   class="form-control"
                   id="name"
                   th:field="*{productName}"
                   th:errorclass="is-invalid"
                   required>
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('productName')}"
                 th:errors="*{productName}">
                Error en nombre
            </div>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Descripción: </label>
            <input type="text"
                   class="form-control"
                   id="description"
                   th:field="*{productDescription}"
                   th:errorclass="is-invalid">
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('productDescription')}"
                 th:errors="*{productDescription}">
                Error en descripción
            </div>
        </div>

        <div class="mb-3">
            <label for="image" class="form-label">Imagen URL: </label>
            <input type="text"
                   class="form-control"
                   id="image"
                   th:field="*{productImage}"
                   th:errorclass="is-invalid">
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('productImage')}"
                 th:errors="*{productImage}">
                Error en imagen
            </div>
        </div>

        <div class="mb-3">
            <label for="price" class="form-label">Precio: </label>
            <input type="number"
                   class="form-control"
                   id="price"
                   min="0"
                   step="0.01"
                   placeholder="0.0"
                   th:field="*{productPrice}"
                   th:errorclass="is-invalid"
                   required>
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('productPrice')}"
                 th:errors="*{productPrice}">
                Error en precio
            </div>
        </div>

        <div class="mb-3">
            <label for="discount" class="form-label">Descuento: </label>
            <input type="number"
                   class="form-control"
                   id="discount"
                   min="0"
                   step="1"
                   placeholder="0"
                   th:field="*{productDiscount}"
                   th:errorclass="is-invalid">
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('productDiscount')}"
                 th:errors="*{productDiscount}">
                Error en descuento
            </div>
        </div>

        <div class="mb-3">
            <label for="brand-id" class="form-label">Desarrolladora: </label>
            <select id="brand-id"
                    class="form-select"
                    th:field="*{brandId}"
                    th:errorclass="is-invalid"
                    required>
                <option value="">Seleccione desarrolladora ...</option>
                <th:block th:remove="all-but-first">
                    <option th:each="brand : ${brands}"
                            th:value="${brand.id}"
                            th:text="${brand.name}"
                            value="1">One</option>
                    <option value="2">Two</option>
                    <option value="3">Three</option>
                </th:block>
            </select>
            <div class="invalid-feedback"
                 th:if="${#fields.hasErrors('brandId')}"
                 th:errors="*{brandId}">
                Error en desarrolladora
            </div>
        </div>

        <div class="mb-3">
            <fieldset>
                <legend>Categorías del producto: </legend>
                <div class="form-check" th:each="category : ${categories}">
                    <input type="checkbox"
                           class="form-check-input"
                           th:field="*{categories}"
                           th:value="${category.id}"
                           th:id="|category-check-${category.id}|">
                    <label class="form-check-label"
                           th:for="|category-check-${category.id}|"
                           th:text="${category.name}">Nombre de la categoría</label>
                </div>
            </fieldset>
        </div>

        <button type="submit" class="btn btn-primary"><i class="fa-regular fa-paper-plane"></i> Enviar</button>
        <a th:href="@{/admin/products/products}" class="btn btn-secondary"><i class="fa-solid fa-arrow-rotate-left"></i> Cancelar</a>
    </form>
</div>

<div th:replace="~{fragments/footer :: carousel}"></div>
<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/footer :: copyright}"></div>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
